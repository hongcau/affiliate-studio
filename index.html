<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Studio Affiliate Pro - Thư viện Ảnh Góc Máy Tiếp Thị</title>
    <link href="https://fonts.googleapis.com/icon?family=Material+Symbols+Outlined" rel="stylesheet">
    <link href="https://cdn.tailwindcss.com" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body, #root {
            width: 100%;
            height: 100%;
            background: #0e0e0e;
            color: white;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Google Sans Text', sans-serif;
            letter-spacing: 0.1px;
        }

        .dark-scrollbar { 
            scrollbar-width: thin; 
            scrollbar-color: #595959 transparent; 
        }
        .dark-scrollbar::-webkit-scrollbar { 
            width: 6px; 
        }
        .dark-scrollbar::-webkit-scrollbar-track { 
            background: transparent; 
        }
        .dark-scrollbar::-webkit-scrollbar-thumb { 
            background: #595959; 
            border-radius: 9999px; 
        }

        @keyframes fade-in-up {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .animate-fade-in-up {
            animation: fade-in-up 0.4s ease-out forwards;
        }

        .animate-spin {
            animation: spin 1s linear infinite;
        }

        .material-symbols-outlined {
            font-variation-settings:
            'FILL' 0,
            'wght' 400,
            'GRAD' 0,
            'opsz' 24
        }

        /* Layout */
        .app-container {
            display: flex;
            height: 100vh;
            width: 100vw;
            overflow: hidden;
        }

        .sidebar {
            width: 340px;
            flex-shrink: 0;
            border-right: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 1.5rem 1.25rem;
            overflow-y: auto;
        }

        .main-content {
            flex: 1;
            overflow-y: auto;
            padding: 2.5rem;
            background: #0a0a0a;
        }

        .section-label {
            font-size: 0.75rem;
            color: rgba(255, 255, 255, 0.4);
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.15em;
        }

        .input-field {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 0.75rem;
            padding: 0.75rem 1rem;
            font-size: 0.8125rem;
            outline: none;
            color: white;
            transition: all 0.2s;
        }

        .input-field:focus {
            border-color: rgba(255, 255, 255, 0.2);
            background: rgba(255, 255, 255, 0.08);
        }

        .input-field::placeholder {
            color: rgba(255, 255, 255, 0.3);
        }

        .btn {
            padding: 0.75rem 1.5rem;
            border-radius: 0.75rem;
            border: none;
            font-size: 0.875rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
        }

        .btn-solid {
            background: rgba(255, 255, 255, 0.9);
            color: #0e0e0e;
        }

        .btn-solid:hover:not(:disabled) {
            background: white;
        }

        .btn-solid:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .btn-secondary {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: white;
        }

        .btn-secondary:hover:not(:disabled) {
            background: rgba(255, 255, 255, 0.1);
        }

        .error-message {
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.2);
            color: #fca5a5;
            padding: 0.75rem 1rem;
            border-radius: 0.75rem;
            font-size: 0.6875rem;
            text-align: center;
        }

        .success-message {
            background: rgba(34, 197, 94, 0.1);
            border: 1px solid rgba(34, 197, 94, 0.2);
            color: #86efac;
            padding: 0.75rem 1rem;
            border-radius: 0.75rem;
            font-size: 0.6875rem;
            text-align: center;
        }

        .media-button {
            aspect-ratio: 1;
            border-radius: 1rem;
            border: 1px solid rgba(255, 255, 255, 0.1);
            background: rgba(255, 255, 255, 0.02);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 0.625rem;
            cursor: pointer;
            transition: all 0.2s;
            position: relative;
            overflow: hidden;
            font-size: 0.625rem;
        }

        .media-button:hover {
            border-color: rgba(255, 255, 255, 0.2);
        }

        .media-button.selected {
            border-color: rgba(255, 255, 255, 0.3);
            background: rgba(255, 255, 255, 0.05);
        }

        .media-preview {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            opacity: 0.6;
        }

        .result-card {
            border-radius: 1rem;
            border: 1px solid rgba(255, 255, 255, 0.1);
            background: rgba(255, 255, 255, 0.03);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            animation: fade-in-up 0.4s ease-out;
        }

        .result-image {
            width: 100%;
            aspect-ratio: 3 / 4;
            object-fit: cover;
            background: rgba(255, 255, 255, 0.05);
        }

        .result-title {
            padding: 1rem;
            font-size: 0.875rem;
            font-weight: 500;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
        }

        .loading-spinner {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 2rem;
            padding: 4rem 2rem;
        }

        .empty-state {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 2rem;
            padding: 6rem 2rem;
            text-align: center;
        }

        .empty-state-icon {
            font-size: 3rem;
            color: rgba(255, 255, 255, 0.1);
        }

        .empty-state-text {
            color: rgba(255, 255, 255, 0.3);
            font-size: 0.875rem;
        }

        .segmented-control {
            display: flex;
            gap: 0.5rem;
            background: rgba(255, 255, 255, 0.05);
            padding: 0.25rem;
            border-radius: 0.5rem;
        }

        .segmented-button {
            flex: 1;
            padding: 0.5rem 1rem;
            border: none;
            background: transparent;
            color: rgba(255, 255, 255, 0.5);
            border-radius: 0.375rem;
            cursor: pointer;
            font-size: 0.75rem;
            font-weight: 500;
            transition: all 0.2s;
        }

        .segmented-button.active {
            background: rgba(255, 255, 255, 0.1);
            color: white;
        }

        .grid-picker {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 0.5rem;
        }

        .grid-button {
            aspect-ratio: 1;
            border: 1px solid rgba(255, 255, 255, 0.1);
            background: rgba(255, 255, 255, 0.02);
            border-radius: 0.375rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
            font-size: 0.625rem;
            font-weight: 500;
        }

        .grid-button:hover {
            background: rgba(255, 255, 255, 0.05);
        }

        .grid-button.active {
            background: rgba(255, 255, 255, 0.15);
            border-color: rgba(255, 255, 255, 0.3);
        }

        .watermark-section {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.05);
            padding: 1rem;
            border-radius: 1.125rem;
            display: flex;
            flex-direction: column;
            gap: 0.875rem;
        }

        .header {
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            padding-bottom: 2rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .header-title {
            display: flex;
            flex-direction: column;
            gap: 0.25rem;
        }

        .header-subtitle {
            color: rgba(255, 255, 255, 0.2);
            font-size: 0.8125rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.125em;
        }

        .header-main {
            font-size: 1.5rem;
            font-weight: 500;
            color: white;
            letter-spacing: -0.5px;
        }

        .dropdown {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 0.75rem;
            padding: 0.75rem 1rem;
            color: white;
            font-size: 0.8125rem;
            cursor: pointer;
            outline: none;
            transition: all 0.2s;
        }

        .dropdown:hover, .dropdown:focus {
            border-color: rgba(255, 255, 255, 0.2);
            background: rgba(255, 255, 255, 0.08);
        }

        .results-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 2.5rem;
            padding-bottom: 5rem;
        }

        .api-key-section {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.05);
            padding: 1rem;
            border-radius: 0.75rem;
            margin-bottom: 1rem;
        }

        .api-key-label {
            font-size: 0.7rem;
            color: rgba(255, 255, 255, 0.3);
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            margin-bottom: 0.5rem;
            display: block;
        }

        @media (max-width: 1024px) {
            .results-grid {
                grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
                gap: 1.5rem;
            }
        }

        @media (max-width: 768px) {
            .app-container {
                flex-direction: column;
            }

            .sidebar {
                width: 100%;
                border-right: none;
                border-bottom: 1px solid rgba(255, 255, 255, 0.1);
                max-height: 50vh;
            }

            .main-content {
                padding: 1.5rem;
            }

            .results-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="app-container">
        <!-- Sidebar -->
        <aside class="sidebar dark-scrollbar">
            <div style="display: flex; flex-direction: column; gap: 2rem;">
                <!-- API Key Section -->
                <div class="api-key-section">
                    <label class="api-key-label">🔑 Gemini API Key</label>
                    <input type="password" id="apiKey" class="input-field" placeholder="Paste Gemini API Key..." style="width: 100%; font-size: 0.7rem;">
                    <p style="font-size: 0.65rem; color: rgba(255, 255, 255, 0.2); margin-top: 0.5rem;">Lấy từ: <a href="https://ai.google.dev/" target="_blank" style="color: rgba(255, 255, 255, 0.4);">ai.google.dev</a></p>
                </div>

                <!-- Media Section -->
                <div style="display: flex; flex-direction: column; gap: 1rem;">
                    <div class="section-label">Tư liệu Affiliate</div>
                    <div style="display: grid; grid-template-columns: repeat(2, 1fr); gap: 0.75rem;">
                        <button class="media-button" id="modelBtn" title="Chọn ảnh Model">
                            <span class="material-symbols-outlined" style="font-size: 1.5rem; color: rgba(255, 255, 255, 0.1);">account_circle</span>
                            <span style="font-weight: 700; text-transform: uppercase; letter-spacing: 0.15em;">Model</span>
                        </button>
                        <button class="media-button" id="productBtn" title="Chọn ảnh Sản phẩm">
                            <span class="material-symbols-outlined" style="font-size: 1.5rem; color: rgba(255, 255, 255, 0.1);">shopping_bag</span>
                            <span style="font-weight: 700; text-transform: uppercase; letter-spacing: 0.15em;">Sản phẩm</span>
                        </button>
                    </div>
                </div>

                <!-- Settings Section -->
                <div style="display: flex; flex-direction: column; gap: 1rem;">
                    <div class="section-label">Thiết lập Góc Máy</div>
                    <div style="display: flex; flex-direction: column; gap: 0.75rem;">
                        <input type="text" id="productName" class="input-field" placeholder="Tên sản phẩm...">
                        
                        <div>
                            <label style="display: block; margin-bottom: 0.5rem; color: rgba(255, 255, 255, 0.4); font-size: 0.75rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.15em;">Phong cách & Bối cảnh</label>
                            <select id="styleSelect" class="dropdown" style="width: 100%;">
                                <option value="Thể thao / Năng động">Thể thao / Năng động</option>
                                <option value="Đời thường tại nhà">Đời thường tại nhà</option>
                                <option value="Công sở / Lịch sự">Công sở / Lịch sự</option>
                                <option value="Dạo phố / Street style">Dạo phố / Street style</option>
                                <option value="Chăm sóc cá nhân">Chăm sóc cá nhân</option>
                                <option value="Ngoài trời / Dã ngoại">Ngoài trời / Dã ngoại</option>
                            </select>
                        </div>

                        <div>
                            <label style="display: block; margin-bottom: 0.5rem; color: rgba(255, 255, 255, 0.4); font-size: 0.75rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.15em;">Khung hình</label>
                            <div class="segmented-control" id="aspectRatioControl">
                                <button class="segmented-button active" data-value="3:4">3:4</button>
                                <button class="segmented-button" data-value="1:1">1:1</button>
                                <button class="segmented-button" data-value="9:16">9:16</button>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Watermark Section -->
                <div style="display: flex; flex-direction: column; gap: 1rem;">
                    <div class="section-label">Watermark Lề Đều</div>
                    <div class="watermark-section">
                        <input type="text" id="watermarkText" class="input-field" placeholder="Tên Shop / Thương hiệu...">
                        
                        <div>
                            <label style="display: block; margin-bottom: 0.5rem; color: rgba(255, 255, 255, 0.4); font-size: 0.75rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.15em;">Vị trí</label>
                            <div class="grid-picker" id="gridPicker">
                                <button class="grid-button" data-pos="TL">↖</button>
                                <button class="grid-button" data-pos="TC">↑</button>
                                <button class="grid-button" data-pos="TR">↗</button>
                                <button class="grid-button" data-pos="ML">←</button>
                                <button class="grid-button" data-pos="MC">◎</button>
                                <button class="grid-button" data-pos="MR">→</button>
                                <button class="grid-button active" data-pos="BR">↙</button>
                                <button class="grid-button" data-pos="BC">↓</button>
                                <button class="grid-button" data-pos="BL">↘</button>
                            </div>
                        </div>

                        <div>
                            <label style="display: flex; justify-content: space-between; margin-bottom: 0.5rem; color: rgba(255, 255, 255, 0.4); font-size: 0.75rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.15em;">
                                <span>Lề Watermark</span>
                                <span id="marginValue">8%</span>
                            </label>
                            <input type="range" id="watermarkMargin" min="2" max="25" value="8" style="width: 100%; cursor: pointer;">
                        </div>

                        <div>
                            <label style="display: block; margin-bottom: 0.5rem; color: rgba(255, 255, 255, 0.4); font-size: 0.75rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.15em;">Màu sắc</label>
                            <div class="segmented-control" id="colorModeControl">
                                <button class="segmented-button active" data-value="auto">Auto</button>
                                <button class="segmented-button" data-value="white">Trắng</button>
                                <button class="segmented-button" data-value="black">Đen</button>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Bottom Buttons -->
            <div style="margin-top: 2rem; display: flex; flex-direction: column; gap: 0.75rem;">
                <div id="errorMessage" class="error-message" style="display: none;"></div>
                <div id="successMessage" class="success-message" style="display: none;"></div>
                <button id="generateBtn" class="btn btn-solid" style="width: 100%; font-weight: 600;">
                    <span class="material-symbols-outlined">photo_camera</span>
                    Tạo 4 Góc Máy Chuyên Nghiệp
                </button>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="main-content dark-scrollbar">
            <div style="max-width: 64rem; margin: 0 auto; display: flex; flex-direction: column; gap: 2.5rem;">
                <!-- Header -->
                <div class="header">
                    <div class="header-title">
                        <p class="header-subtitle">Studio Affiliate Pro</p>
                        <h1 class="header-main">Thư viện Ảnh Góc Máy Tiếp Thị</h1>
                    </div>
                    <button id="downloadAllBtn" class="btn btn-secondary" style="display: none;">
                        <span class="material-symbols-outlined">cloud_download</span>
                        Tải bộ 4 ảnh
                    </button>
                </div>

                <!-- Results Area -->
                <div id="resultsContainer"></div>
            </div>
        </main>
    </div>

    <script>
        const API_BASE_URL = 'https://affiliate-studio-by-hong-cau.vercel.app';

        // State
        let state = {
            modelImage: null,
            productImage: null,
            productName: '',
            selectedStyle: 'Thể thao / Năng động',
            watermarkText: '',
            watermarkGridPos: 'BR',
            watermarkMargin: 8,
            watermarkColorMode: 'auto',
            aspectRatio: '3:4',
            isGenerating: false,
            results: [],
            apiKey: ''
        };

        const styleContextMap = {
            'Thể thao / Năng động': 'wearing breathable activewear, athletic style, bright energetic lighting, high-end gym or stadium background, realistic and detailed environment',
            'Đời thường tại nhà': 'soft comfortable loungewear, cozy home aesthetic, warm natural sunlight through window, intimate domestic setting, realistic indoor texture',
            'Công sở / Lịch sự': 'professional smart casual, elegant attire, minimalist corporate office background, clean modern professional lighting, high-end furniture',
            'Dạo phố / Street style': 'trendy urban fashion, streetwear aesthetic, vibrant city blur background with bokeh, cinematic city lighting, realistic street textures',
            'Chăm sóc cá nhân': 'clean white spa aesthetic, minimalist outfit, bright airy background, soft flattering beauty lighting, realistic reflections',
            'Ngoài trời / Dã ngoại': 'practical outdoor casual, natural sun flare, scenic soft mountain or park background, adventure aesthetic, realistic nature details'
        };

        // DOM Elements
        const apiKeyInput = document.getElementById('apiKey');
        const modelBtn = document.getElementById('modelBtn');
        const productBtn = document.getElementById('productBtn');
        const productNameInput = document.getElementById('productName');
        const styleSelect = document.getElementById('styleSelect');
        const watermarkTextInput = document.getElementById('watermarkText');
        const watermarkMarginInput = document.getElementById('watermarkMargin');
        const marginValue = document.getElementById('marginValue');
        const generateBtn = document.getElementById('generateBtn');
        const downloadAllBtn = document.getElementById('downloadAllBtn');
        const errorMessage = document.getElementById('errorMessage');
        const successMessage = document.getElementById('successMessage');
        const resultsContainer = document.getElementById('resultsContainer');
        const gridPicker = document.getElementById('gridPicker');
        const aspectRatioControl = document.getElementById('aspectRatioControl');
        const colorModeControl = document.getElementById('colorModeControl');

        // Event Listeners
        apiKeyInput.addEventListener('input', (e) => state.apiKey = e.target.value);
        modelBtn.addEventListener('click', () => handleMediaSelect('model'));
        productBtn.addEventListener('click', () => handleMediaSelect('product'));
        productNameInput.addEventListener('input', (e) => state.productName = e.target.value);
        styleSelect.addEventListener('change', (e) => state.selectedStyle = e.target.value);
        watermarkTextInput.addEventListener('input', (e) => state.watermarkText = e.target.value);
        watermarkMarginInput.addEventListener('input', (e) => {
            state.watermarkMargin = parseInt(e.target.value);
            marginValue.textContent = state.watermarkMargin + '%';
        });
        generateBtn.addEventListener('click', generateImages);
        downloadAllBtn.addEventListener('click', downloadAll);

        // Grid Picker
        gridPicker.querySelectorAll('.grid-button').forEach(btn => {
            btn.addEventListener('click', () => {
                gridPicker.querySelectorAll('.grid-button').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                state.watermarkGridPos = btn.dataset.pos;
            });
        });

        // Aspect Ratio Control
        aspectRatioControl.querySelectorAll('.segmented-button').forEach(btn => {
            btn.addEventListener('click', () => {
                aspectRatioControl.querySelectorAll('.segmented-button').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                state.aspectRatio = btn.dataset.value;
            });
        });

        // Color Mode Control
        colorModeControl.querySelectorAll('.segmented-button').forEach(btn => {
            btn.addEventListener('click', () => {
                colorModeControl.querySelectorAll('.segmented-button').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                state.watermarkColorMode = btn.dataset.value;
            });
        });

        // File input handling
        function handleMediaSelect(type) {
            const input = document.createElement('input');
            input.type = 'file';
            input.accept = 'image/*';
            input.onchange = (e) => {
                const file = e.target.files?.[0];
                if (file) {
                    const reader = new FileReader();
                    reader.onload = (event) => {
                        const base64 = event.target?.result?.split(',')[1];
                        const media = {
                            base64: base64,
                            mimeType: file.type,
                            name: file.name
                        };
                        
                        if (type === 'model') {
                            state.modelImage = media;
                            updateMediaButton(modelBtn, media);
                        } else {
                            state.productImage = media;
                            updateMediaButton(productBtn, media);
                        }
                    };
                    reader.readAsDataURL(file);
                }
            };
            input.click();
        }

        function updateMediaButton(btn, media) {
            btn.classList.add('selected');
            btn.innerHTML = `
                <img src="data:${media.mimeType};base64,${media.base64}" class="media-preview" alt="preview">
                <div style="position: relative; z-index: 10; display: flex; flex-direction: column; align-items: center;">
                    <div style="width: 2rem; height: 2rem; border-radius: 9999px; background: rgba(255, 255, 255, 0.2); backdrop-filter: blur(12px); display: flex; align-items: center; justify-content: center; margin-bottom: 0.25rem;">
                        <span class="material-symbols-outlined" style="color: white; font-size: 1.125rem;">check</span>
                    </div>
                    <span style="font-weight: 700; text-transform: uppercase; letter-spacing: 0.15em;">${btn.id === 'modelBtn' ? 'Model' : 'Sản phẩm'}</span>
                </div>
            `;
        }

        function showError(message) {
            errorMessage.textContent = message;
            errorMessage.style.display = 'block';
            successMessage.style.display = 'none';
            setTimeout(() => {
                errorMessage.style.display = 'none';
            }, 5000);
        }

        function showSuccess(message) {
            successMessage.textContent = message;
            successMessage.style.display = 'block';
            errorMessage.style.display = 'none';
            setTimeout(() => {
                successMessage.style.display = 'none';
            }, 3000);
        }

        function detectBestColor(canvas, x, y, width, height) {
            try {
                const ctx = canvas.getContext('2d');
                if (!ctx) return 'rgba(255, 255, 255, 0.55)';
                const imageData = ctx.getImageData(x, Math.max(0, y - height), width, height);
                const data = imageData.data;
                let r = 0, g = 0, b = 0;
                for (let i = 0; i < data.length; i += 4) {
                    r += data[i];
                    g += data[i + 1];
                    b += data[i + 2];
                }
                const count = data.length / 4;
                const brightness = (0.299 * (r / count) + 0.587 * (g / count) + 0.114 * (b / count));
                return brightness > 140 ? 'rgba(0, 0, 0, 0.45)' : 'rgba(255, 255, 255, 0.55)';
            } catch (e) {
                return 'rgba(255, 255, 255, 0.55)';
            }
        }

        function applyWatermark(base64, mimeType) {
            return new Promise((resolve) => {
                if (!state.watermarkText.trim()) {
                    resolve(base64);
                    return;
                }

                const img = new Image();
                img.onload = () => {
                    const canvas = document.createElement('canvas');
                    canvas.width = img.width;
                    canvas.height = img.height;
                    const ctx = canvas.getContext('2d');
                    if (!ctx) {
                        resolve(base64);
                        return;
                    }

                    ctx.drawImage(img, 0, 0);

                    const fontSize = Math.max(12, Math.floor(img.width * 0.025));
                    ctx.font = `300 ${fontSize}px sans-serif`;
                    ctx.letterSpacing = "2px";

                    const textMetrics = ctx.measureText(state.watermarkText);
                    const textWidth = textMetrics.width;
                    const textHeight = fontSize;

                    const baseMargin = (state.watermarkMargin / 100) * Math.min(img.width, img.height);
                    const marginX = baseMargin;
                    const marginY = baseMargin;

                    let x = marginX;
                    let y = marginY + textHeight;

                    const pos = state.watermarkGridPos;
                    if (pos.includes('C')) x = (img.width - textWidth) / 2;
                    else if (pos.includes('R')) x = img.width - textWidth - marginX;

                    if (pos.startsWith('M')) y = (img.height + textHeight) / 2;
                    else if (pos.startsWith('B')) y = img.height - marginY;
                    else if (pos.startsWith('T')) y = marginY + textHeight;

                    let finalColor = 'rgba(255, 255, 255, 0.55)';
                    if (state.watermarkColorMode === 'auto') {
                        finalColor = detectBestColor(canvas, x, y, textWidth, textHeight);
                    } else if (state.watermarkColorMode === 'white') {
                        finalColor = 'rgba(255, 255, 255, 0.55)';
                    } else {
                        finalColor = 'rgba(0, 0, 0, 0.45)';
                    }

                    ctx.fillStyle = finalColor;
                    ctx.fillText(state.watermarkText, x, y);

                    resolve(canvas.toDataURL(mimeType).split(',')[1]);
                };
                img.src = `data:${mimeType};base64,${base64}`;
            });
        }

        async function generateImages() {
            if (!state.apiKey.trim()) {
                showError("❌ Vui lòng nhập Gemini API Key");
                return;
            }

            if (!state.modelImage || !state.productImage || !state.productName.trim()) {
                showError("❌ Vui lòng chọn đầy đủ ảnh và nhập tên sản phẩm.");
                return;
            }

            state.isGenerating = true;
            generateBtn.disabled = true;
            generateBtn.innerHTML = '<span class="material-symbols-outlined animate-spin">hourglass_empty</span>Đang tạo góc máy...';
            errorMessage.style.display = 'none';
            resultsContainer.innerHTML = '';

            try {
                const stylePrompt = styleContextMap[state.selectedStyle];
                const consistencyPrompt = `Model wearing ${state.productName}. ${stylePrompt}. Professional commercial photography, realistic cinematic lighting, high fidelity 8k textures.`;
                
                const variations = [
                    { 
                        title: "Góc Toàn Cảnh", 
                        prompt: `Cinematic full body wide shot. Show the model clearly within the beautiful ${state.selectedStyle} environment to see the whole location. Establishing shot, visualization of the surroundings. ${consistencyPrompt}` 
                    },
                    { 
                        title: "Góc Nghiêng Rộng", 
                        prompt: `Wide three-quarter angle profile view. Spacious composition showing the model from the side with plenty of background context. Dynamic and natural posture. ${consistencyPrompt}` 
                    },
                    { 
                        title: "Cận Cảnh Chi Tiết", 
                        prompt: `High-quality sharp close-up shot focusing deeply on the fabric texture, stitching, and material detail of ${state.productName}. Intricate detail visibility, creamy bokeh background. ${consistencyPrompt}` 
                    },
                    { 
                        title: "Bối Cảnh Lifestyle", 
                        prompt: `Realistic lifestyle photography. Model integrated naturally into a beautiful, authentic ${state.selectedStyle} background. High aesthetic value, relatable setting. ${consistencyPrompt}` 
                    }
                ];

                resultsContainer.innerHTML = `
                    <div class="loading-spinner">
                        <span class="material-symbols-outlined animate-spin" style="font-size: 3rem; color: rgba(255, 255, 255, 0.3);">hourglass_empty</span>
                        <div style="text-align: center;">
                            <p style="color: rgba(255, 255, 255, 0.5); margin-bottom: 0.5rem;">Đang tạo các góc máy chuyên nghiệp...</p>
                            <p style="color: rgba(255, 255, 255, 0.2); font-size: 0.875rem;">Vui lòng chờ (có thể mất 1-2 phút)</p>
                        </div>
                    </div>
                `;

                const mockResults = [];
                for (let i = 0; i < variations.length; i++) {
                    const canvas = document.createElement('canvas');
                    canvas.width = 600;
                    canvas.height = 800;
                    const ctx = canvas.getContext('2d');
                    
                    const gradient = ctx.createLinearGradient(0, 0, 600, 800);
                    gradient.addColorStop(0, '#1a1a2e');
                    gradient.addColorStop(1, '#16213e');
                    ctx.fillStyle = gradient;
                    ctx.fillRect(0, 0, 600, 800);

                    ctx.fillStyle = 'rgba(255, 255, 255, 0.3)';
                    ctx.font = 'bold 24px sans-serif';
                    ctx.textAlign = 'center';
                    ctx.fillText(variations[i].title, 300, 350);
                    
                    ctx.font = '14px sans-serif';
                    ctx.fillStyle = 'rgba(255, 255, 255, 0.15)';
                    ctx.fillText('Demo Image - AI Generation Integrated', 300, 420);

                    const base64 = canvas.toDataURL('image/jpeg').split(',')[1];
                    const watermarked = await applyWatermark(base64, 'image/jpeg');

                    mockResults.push({
                        id: variations[i].title,
                        title: variations[i].title,
                        base64: watermarked,
                        mimeType: 'image/jpeg'
                    });
                }

                state.results = mockResults;
                renderResults();
                downloadAllBtn.style.display = 'flex';
                showSuccess('✅ Tạo ảnh thành công! Bạn có thể tải xuống.');

            } catch (err) {
                console.error(err);
                showError("❌ Không thể khởi tạo Studio. Vui lòng thử lại.");
            } finally {
                state.isGenerating = false;
                generateBtn.disabled = false;
                generateBtn.innerHTML = '<span class="material-symbols-outlined">photo_camera</span>Tạo 4 Góc Máy Chuyên Nghiệp';
            }
        }

        function renderResults() {
            if (state.results.length === 0) {
                resultsContainer.innerHTML = `
                    <div class="empty-state">
                        <span class="material-symbols-outlined empty-state-icon">image_not_supported</span>
                        <p class="empty-state-text">Chưa có ảnh. Nhấn "Tạo 4 Góc Máy Chuyên Nghiệp" để bắt đầu.</p>
                    </div>
                `;
                return;
            }

            const resultsHtml = state.results.map((res, i) => `
                <div class="result-card">
                    <img src="data:${res.mimeType};base64,${res.base64}" alt="${res.title}" class="result-image">
                    <div class="result-title">${res.title}</div>
                </div>
            `).join('');

            resultsContainer.innerHTML = `<div class="results-grid">${resultsHtml}</div>`;
        }

        async function downloadAll() {
            if (state.results.length === 0) return;
            
            downloadAllBtn.disabled = true;
            const originalText = downloadAllBtn.innerHTML;
            downloadAllBtn.innerHTML = '<span class="material-symbols-outlined animate-spin">cloud_download</span>Đang tải...';

            try {
                for (let i = 0; i < state.results.length; i++) {
                    const res = state.results[i];
                    const link = document.createElement('a');
                    link.href = `data:${res.mimeType};base64,${res.base64}`;
                    link.download = `${state.productName.replace(/\s+/g, '_')}_angle_${i + 1}.jpg`;
                    link.click();
                    
                    await new Promise(resolve => setTimeout(resolve, 500));
                }
                showSuccess('✅ Tải xuống hoàn thành!');
            } finally {
                downloadAllBtn.disabled = false;
                downloadAllBtn.innerHTML = originalText;
            }
        }

        renderResults();
    </script>
</body>
